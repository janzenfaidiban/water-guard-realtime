<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Guard - Realtime CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    <div class="max-w-6xl mx-auto px-4">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">💧 Water Guard</h1>
            <p class="text-gray-600">Sistem Manajemen Data Realtime</p>
        </div>

        <div x-data="crudApp()" x-cloak x-init="init()" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Form Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-8">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        <span x-text="editingId ? '✏️ Edit Data' : '➕ Tambah Data'"></span>
                    </h2>
                    
                    <form @submit.prevent="saveData" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lokasi</label>
                            <input 
                                type="text" 
                                x-model="formData.location" 
                                placeholder="Masukkan nama lokasi"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                required
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                            <select 
                                x-model="formData.status"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="">Pilih Status</option>
                                <option value="normal">Normal</option>
                                <option value="warning">Warning</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kualitas Air (%)</label>
                            <input 
                                type="number" 
                                x-model.number="formData.quality" 
                                placeholder="0-100"
                                min="0"
                                max="100"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Debit Air (m³/jam)</label>
                            <input 
                                type="number" 
                                x-model.number="formData.flowRate" 
                                placeholder="Masukkan debit air"
                                step="0.1"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Catatan</label>
                            <textarea 
                                x-model="formData.notes" 
                                placeholder="Tambahkan catatan"
                                rows="3"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            ></textarea>
                        </div>

                        <div class="flex gap-2">
                            <button 
                                type="submit"
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200"
                            >
                                <span x-text="editingId ? 'Update' : 'Simpan'"></span>
                            </button>
                            <button 
                                type="button"
                                @click="resetForm"
                                x-show="editingId"
                                class="flex-1 bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-md transition duration-200"
                            >
                                Batal
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Data List Panel -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-gray-800">📊 Data Monitoring</h2>
                        <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-bold" x-text="`${items.length} item`"></span>
                    </div>

                    <!-- Search -->
                    <div class="mb-4">
                        <input 
                            type="text" 
                            x-model="searchQuery"
                            placeholder="Cari lokasi..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                    </div>

                    <!-- Loading State -->
                    <div x-show="loading" class="text-center py-8">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                        <p class="text-gray-500 mt-2">Memuat data...</p>
                    </div>

                    <!-- Empty State -->
                    <div x-show="!loading && filteredItems.length === 0" class="text-center py-8">
                        <p class="text-gray-500">Belum ada data. Tambahkan data baru untuk memulai.</p>
                    </div>

                    <!-- Items List -->
                    <div x-show="!loading && filteredItems.length > 0" class="space-y-3 max-h-96 overflow-y-auto">
                        <template x-for="item in filteredItems" :key="item.id">
                            <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-200">
                                <div class="flex items-start justify-between mb-2">
                                    <div class="flex-1">
                                        <h3 class="font-bold text-gray-800" x-text="item.location"></h3>
                                        <div class="flex gap-2 mt-1">
                                            <span 
                                                :class="[
                                                    'px-2 py-1 rounded text-xs font-semibold',
                                                    item.status === 'normal' ? 'bg-green-100 text-green-800' : 
                                                    item.status === 'warning' ? 'bg-yellow-100 text-yellow-800' : 
                                                    'bg-red-100 text-red-800'
                                                ]"
                                                x-text="item.status ? item.status.toUpperCase() : 'N/A'"
                                            ></span>
                                            <span class="text-xs text-gray-500" x-text="`Kualitas: ${item.quality}%`"></span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="text-sm text-gray-600 mb-3 space-y-1">
                                    <p x-text="`Debit: ${item.flowRate || '-'} m³/jam`"></p>
                                    <p class="italic" x-text="item.notes ? `Catatan: ${item.notes}` : 'Catatan: -'"></p>
                                    <p class="text-xs text-gray-400" x-text="`Updated: ${new Date(item.timestamp).toLocaleString('id-ID')}`"></p>
                                </div>

                                <div class="flex gap-2">
                                    <button 
                                        @click="editItem(item.id, item)"
                                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-1 px-3 rounded transition duration-200"
                                    >
                                        ✏️ Edit
                                    </button>
                                    <button 
                                        @click="deleteItem(item.id)"
                                        class="flex-1 bg-red-600 hover:bg-red-700 text-white text-sm font-bold py-1 px-3 rounded transition duration-200"
                                    >
                                        🗑️ Hapus
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Load app.js first as module -->
    <script type="module" src="app.js"></script>
    <!-- Then load Alpine -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
