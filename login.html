<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Water Guard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-md w-full max-w-md p-8">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">💧</div>
            <h1 class="text-2xl font-bold text-gray-800">Water Guard</h1>
            <p class="text-gray-500 text-sm mt-1">Admin Dashboard</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Masukkan username"
                    required
                >
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Masukkan password"
                    required
                >
            </div>

            <!-- Error Message -->
            <div id="errorMsg" class="hidden text-red-500 text-sm text-center py-2 bg-red-50 rounded-lg"></div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
            >
                Masuk
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-gray-400 text-xs mt-8">© 2026 Water Guard Monitoring</p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
