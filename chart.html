<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Trend - Water Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="max-w-7xl mx-auto px-4">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">💧 Water Guard</h1>
                    <p class="text-gray-500 text-sm">Monitoring Kualitas Air Realtime</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300">📊 Tabel Data</button>
                    <button onclick="window.location.href='chart.html'" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">📈 Grafik Trend</button>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600">Logout</button>
                </div>
            </div>
        </div>

        <div x-data="chartApp()" x-cloak x-init="init()" class="bg-white rounded-lg shadow-md overflow-hidden">
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 p-6 border-b border-gray-100">
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-gray-500">Total Data</p>
                    <p class="text-2xl font-bold text-gray-800" x-text="displayItems.length"></p>
                </div>
                <div class="bg-blue-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-blue-600">pH Terakhir</p>
                    <p class="text-2xl font-bold text-blue-700" x-text="latestData?.ph || '-'"></p>
                </div>
                <div class="bg-orange-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-orange-600">Suhu (°C)</p>
                    <p class="text-2xl font-bold text-orange-700" x-text="latestData?.suhu || '-'"></p>
                </div>
                <div class="bg-green-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-green-600">TDS</p>
                    <p class="text-2xl font-bold text-green-700" x-text="latestData?.tds || '-'"></p>
                </div>
                <div class="bg-red-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-red-600">NTU</p>
                    <p class="text-2xl font-bold text-red-700" x-text="latestData?.ntu || '-'"></p>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="p-6">
                <!-- Loading -->
                <div x-show="loading && displayItems.length === 0" class="text-center py-12">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
                    <p class="text-gray-500">Memuat data...</p>
                </div>
                
                <!-- Chart -->
                <div x-show="!loading || displayItems.length > 0">
                    <div class="bg-white rounded-lg border border-gray-200 p-4">
                        <div class="w-full" style="min-height: 450px;">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status -->
            <div class="px-6 py-3 border-t border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div x-show="loading" class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>
                        <span class="text-sm text-blue-600">Memuat...</span>
                    </div>
                    <div x-show="!loading" class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm text-green-600">Live - Terhubung</span>
                    </div>
                </div>
                <div class="text-sm text-gray-500">
                    <span x-text="displayItems.length"></span> data | Update: <span x-text="lastUpdateTime || '-'"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script>protectPage();</script>
    <script type="module" src="js/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
