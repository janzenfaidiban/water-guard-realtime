<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Data - Water Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fadeIn { animation: fadeIn 0.3s ease-in; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="max-w-7xl mx-auto px-4">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">💧 Water Guard</h1>
                    <p class="text-gray-500 text-sm">Monitoring Kualitas Air Realtime</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">📊 Tabel Data</button>
                    <button onclick="window.location.href='chart.html'" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300">📈 Grafik Trend</button>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600">Logout</button>
                </div>
            </div>
        </div>

        <div x-data="tableApp()" x-cloak x-init="init()" class="bg-white rounded-lg shadow-md overflow-hidden">
            <!-- Stats Cards -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 p-6 border-b border-gray-100">
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-gray-500">Total Data</p>
                    <p class="text-2xl font-bold text-gray-800" x-text="displayItems.length"></p>
                </div>
                <div class="bg-blue-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-blue-600">pH Terakhir</p>
                    <p class="text-2xl font-bold text-blue-700" x-text="latestData?.ph || '-'"></p>
                </div>
                <div class="bg-orange-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-orange-600">Suhu (°C)</p>
                    <p class="text-2xl font-bold text-orange-700" x-text="latestData?.suhu || '-'"></p>
                </div>
                <div class="bg-green-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-green-600">TDS</p>
                    <p class="text-2xl font-bold text-green-700" x-text="latestData?.tds || '-'"></p>
                </div>
                <div class="bg-red-50 rounded-lg p-4">
                    <p class="text-xs font-medium text-red-600">NTU</p>
                    <p class="text-2xl font-bold text-red-700" x-text="latestData?.ntu || '-'"></p>
                </div>
            </div>

            <!-- Status -->
            <div class="px-6 py-3 border-b border-gray-100 flex items-center gap-2">
                <div x-show="loading" class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce"></div>
                    <span class="text-sm text-blue-600">Memuat data...</span>
                </div>
                <div x-show="!loading" class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm text-green-600">Live - Terhubung</span>
                </div>
            </div>


            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex flex-wrap items-end gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">📅 Tanggal</label>
                    <select x-model="filter.day" class="bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                        <option value="">Semua</option>
                        <template x-for="d in 31">
                            <option :value="d" x-text="d"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">🌙 Bulan</label>
                    <select x-model="filter.month" class="bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                        <option value="">Semua</option>
                        <option value="0">Januari</option>
                        <option value="1">Februari</option>
                        <option value="2">Maret</option>
                        <option value="3">April</option>
                        <option value="4">Mei</option>
                        <option value="5">Juni</option>
                        <option value="6">Juli</option>
                        <option value="7">Agustus</option>
                        <option value="8">September</option>
                        <option value="9">Oktober</option>
                        <option value="10">November</option>
                        <option value="11">Desember</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">🗓️ Tahun</label>
                    <select x-model="filter.year" class="bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                        <option value="">Semua</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button @click="applyFilter()" class="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition">
                        Filter Data
                    </button>
                    <button @click="resetFilter()" class="px-5 py-2 bg-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-300 transition">
                        Reset
                    </button>
                </div>
            </div>


            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700 w-12">#</th>
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700">Waktu</th>
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700">pH</th>
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700">Suhu (°C)</th>
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700">TDS</th>
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700">NTU</th>
                            <th class="px-6 py-4 text-left text-sm font-bold text-gray-700">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Empty State -->
                        <tr x-show="!loading && displayItems.length === 0">
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                <p class="text-lg">📭 Belum ada data</p>
                                <p class="text-sm">Tunggu data dari sensor...</p>
                            </td>
                        </tr>

                        <!-- Data Rows -->
                        <template x-for="(item, index) in displayItems" :key="item.id">
                            <tr class="border-b border-gray-100 hover:bg-gray-50 transition fadeIn" 
                                :class="index === 0 && 'bg-blue-50'">
                                <td class="px-6 py-4 text-sm font-semibold text-gray-600" x-text="index + 1"></td>
                                <td class="px-6 py-4 text-sm text-gray-700 font-medium" x-text="formatTime(item.waktu)"></td>
                                <td class="px-6 py-4 text-sm">
                                    <span :class="getPhStatus(item.ph)" x-text="`${item.ph}`"></span>
                                </td>
                                <td class="px-6 py-4 text-sm">
                                    <span :class="getTempStatus(item.suhu)" x-text="`${item.suhu}°C`"></span>
                                </td>
                                <td class="px-6 py-4 text-sm font-medium" x-text="item.tds"></td>
                                <td class="px-6 py-4 text-sm">
                                    <span :class="getNtuStatus(item.ntu)" x-text="item.ntu"></span>
                                </td>
                                <td class="px-6 py-4 text-sm">
                                    <span x-text="getOverallStatus(item)" 
                                          :class="getStatusBadgeClass(item)"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <div class="px-6 py-4 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="text-sm text-gray-500">
        Menampilkan <span class="font-bold text-gray-800" x-text="displayItems.length"></span> 
        dari <span class="font-bold text-gray-800" x-text="isFiltered ? filteredItems.length : items.length"></span> data
    </div>

    <div class="flex items-center gap-2">
        <button 
            @click="prevPage()" 
            :disabled="currentPage === 1"
            :class="currentPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-100'"
            class="px-3 py-1 border rounded text-sm font-medium text-gray-600 transition">
            Prev
        </button>
        
        <div class="flex items-center gap-1">
            <template x-for="p in totalPages" :key="p">
                <button 
                    @click="currentPage = p"
                    x-show="p >= currentPage - 2 && p <= currentPage + 2"
                    :class="currentPage === p ? 'bg-blue-600 text-white border-blue-600' : 'text-gray-600 hover:bg-gray-50'"
                    class="w-8 h-8 border rounded text-sm font-medium transition"
                    x-text="p">
                </button>
            </template>
        </div>

        <button 
            @click="nextPage()" 
            :disabled="currentPage === totalPages"
            :class="currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-100'"
            class="px-3 py-1 border rounded text-sm font-medium text-gray-600 transition">
            Next
        </button>
    </div>

    <div class="text-xs text-gray-400">
        Hal: <span x-text="currentPage"></span> / <span x-text="totalPages"></span>
    </div>
</div>

            <!-- Footer -->
            <div class="px-6 py-4 border-t border-gray-100 text-sm text-gray-500">
                <p>Menampilkan <strong x-text="displayItems.length"></strong> dari <strong x-text="items.length"></strong> data | Update: <span x-text="lastUpdateTime || '-'"></span></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script>protectPage();</script>
    <script type="module" src="js/table.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
